<template>
    <div class="slds-card chart-container">
        <!-- Card Header -->
        <template if:true={title}>
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__figure slds-media__figure_fixed-width">
                        <lightning-icon icon-name="utility:chart" alternative-text="Chart" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title slds-truncate chart-title">{title}</h2>
                    </div>
                </header>
            </div>
            <hr class="slds-m-around_none" />
        </template>

        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="slds-card__body loading-container">
                <lightning-spinner alternative-text="Loading chart data" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={hasError}>
            <div class="slds-card__body">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <lightning-icon icon-name="utility:error" alternative-text="Error" size="x-small"
                        class="slds-m-right_x-small"></lightning-icon>
                    <h2>{errorMessage}</h2>
                </div>
            </div>
        </template>

        <!-- Empty State -->
        <template if:true={isEmpty}>
            <div class="slds-card__body empty-state">
                <lightning-icon icon-name="utility:chart" size="large" class="empty-icon"></lightning-icon>
                <p class="slds-text-heading_small slds-m-top_medium">No data available</p>
                <p class="slds-text-body_small slds-m-top_x-small">There is no data to display in this chart.</p>
            </div>
        </template>

        <!-- Chart Body -->
        <template if:true={hasData}>
            <div class="slds-card__body chart-body">
                <div class={chartLayoutClass}>

                    <!-- SVG Chart Area -->
                    <div class="chart-svg-wrapper" role="img" aria-label={ariaLabel}>
                        <svg
                            class="chart-svg"
                            viewBox="0 0 220 220"
                            xmlns="http://www.w3.org/2000/svg"
                            onmouseleave={handleChartMouseLeave}>

                            <!-- Drop shadow filter definition -->
                            <defs>
                                <filter id="slice-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.25)" />
                                </filter>
                                <filter id="slice-hover-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.35)" />
                                </filter>
                            </defs>

                            <g transform="translate(110,110)">
                                <!-- Chart slices -->
                                <template for:each={computedSlices} for:item="slice">
                                    <path
                                        key={slice.id}
                                        d={slice.pathData}
                                        fill={slice.color}
                                        stroke="#ffffff"
                                        stroke-width="2"
                                        stroke-linejoin="round"
                                        data-index={slice.index}
                                        class={slice.sliceClass}
                                        style={slice.transformStyle}
                                        onmouseenter={handleSliceMouseEnter}
                                        onmouseleave={handleSliceMouseLeave}
                                        onfocus={handleSliceFocus}
                                        onblur={handleSliceBlur}
                                        tabindex="0"
                                        role="button"
                                        aria-label={slice.ariaLabel}>
                                    </path>
                                </template>

                                <!-- Donut center hole -->
                                <template if:true={isDonut}>
                                    <circle cx="0" cy="0" r={innerRadius} fill="white" class="center-hole"></circle>

                                    <!-- Center text -->
                                    <template if:true={showCenterText}>
                                        <text x="0" y="-10" text-anchor="middle" class="center-label">{centerLabel}</text>
                                        <text x="0" y="14" text-anchor="middle" class="center-value">{formattedTotal}</text>
                                    </template>
                                </template>
                            </g>
                        </svg>

                        <!-- Tooltip -->
                        <template if:true={tooltip.visible}>
                            <div class={tooltipClass} style={tooltipPositionStyle} role="tooltip" aria-live="polite">
                                <div class="tooltip-header">
                                    <span class="tooltip-color-dot" style={tooltip.dotStyle}></span>
                                    <span class="tooltip-label">{tooltip.label}</span>
                                </div>
                                <div class="tooltip-body">
                                    <div class="tooltip-row">
                                        <span class="tooltip-key">Value</span>
                                        <span class="tooltip-val">{tooltip.formattedValue}</span>
                                    </div>
                                    <div class="tooltip-row">
                                        <span class="tooltip-key">Share</span>
                                        <span class="tooltip-val tooltip-percent">{tooltip.percent}</span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Legend -->
                    <template if:true={showLegend}>
                        <div class={legendClass} role="list" aria-label="Chart legend">
                            <template if:true={legendTitle}>
                                <p class="legend-heading">{legendTitle}</p>
                            </template>
                            <template for:each={computedLegendItems} for:item="item">
                                <div key={item.id}
                                    class={item.legendItemClass}
                                    data-index={item.index}
                                    role="listitem"
                                    tabindex="0"
                                    onmouseenter={handleLegendMouseEnter}
                                    onmouseleave={handleLegendMouseLeave}
                                    onfocus={handleLegendFocus}
                                    onblur={handleLegendBlur}
                                    aria-label={item.ariaLabel}>

                                    <span class="legend-swatch" style={item.swatchStyle} aria-hidden="true"></span>
                                    <span class="legend-label slds-truncate" title={item.label}>{item.label}</span>
                                    <span class="legend-value">{item.formattedValue}</span>
                                    <span class="legend-percent">{item.percent}%</span>
                                </div>
                            </template>

                            <!-- Legend Total Row -->
                            <template if:true={showLegendTotal}>
                                <hr class="legend-divider" />
                                <div class="legend-total-row">
                                    <span class="legend-total-label">Total</span>
                                    <span class="legend-total-value">{formattedTotal}</span>
                                    <span class="legend-total-percent">100%</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Footer -->
        <template if:true={footerText}>
            <footer class="slds-card__footer chart-footer">
                <span class="slds-text-body_small slds-text-color_weak">{footerText}</span>
            </footer>
        </template>
    </div>
</template>
